name: Release

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      go-version:
        type: string
        required: true
    secrets:
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_TOKEN:
        required: true

env:
  GITHUB_REGISTRY: ghcr.io
  DOCKER_HUB_ORGANIZATION: bencherdev
  API_DOCKER_IMAGE: bencher-api
  CONSOLE_DOCKER_IMAGE: bencher-console
  CLI_DOCKER_IMAGE: bencher
  CLI_BIN_NAME: bencher
  RUNNER_BIN_NAME: runner

jobs:
  release_smoke_tests:
    name: Release API Smoke Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-14
          - os: windows-2022
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        if: matrix.os == 'ubuntu-22.04'
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Setup Go (for OCI conformance tests)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ inputs.go-version }}
      - name: Run Smoke Test
        env:
          RUST_BACKTRACE: full
        run: cargo test-api smoke localhost

  release:
    name: Release Bencher
    if: startsWith(github.ref, 'refs/tags/')
    needs: release_smoke_tests
    runs-on: ubuntu-22.04
    env:
      BUILD_LINUX_X86_64: linux-x86-64
      BUILD_LINUX_ARM_64: linux-arm-64
      BUILD_MACOS_X86_64: macos-x86-64
      BUILD_MACOS_ARM_64: macos-arm-64
      BUILD_WINDOWS_X86_64: windows-x86-64
      BUILD_WINDOWS_ARM_64: windows-arm-64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set version
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          VERSION="$HEAD_REF"
          echo "VERSION=${VERSION//\//-}" >> "$GITHUB_ENV"

      # Download all artifacts from the CI workflow
      - name: Download CLI Linux x86_64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}

      - name: Download CLI Linux ARM64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}

      - name: Download CLI macOS x86_64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_MACOS_X86_64 }}

      - name: Download CLI macOS ARM64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_MACOS_ARM_64 }}

      - name: Download CLI Windows x86_64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_WINDOWS_X86_64 }}.exe

      - name: Download CLI Windows ARM64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_WINDOWS_ARM_64 }}.exe

      - name: Download CLI Linux x86_64 .deb Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}.deb

      - name: Download CLI Linux ARM64 .deb Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}.deb

      - name: Download Runner Linux x86_64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.RUNNER_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}

      - name: Download Runner Linux ARM64 Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.RUNNER_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}

      # Push multi-arch images to GHCR & Docker Hub
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Tag & Push API Image to GHCR & Docker Hub
        run: |
          export GITHUB_IMAGE=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}
          export DOCKER_HUB_IMAGE=${{ env.DOCKER_HUB_ORGANIZATION }}/${{ env.API_DOCKER_IMAGE }}
          export TAG=${VERSION}
          docker buildx imagetools create \
            --tag ${GITHUB_IMAGE}:latest \
            --tag ${GITHUB_IMAGE}:${TAG} \
            --tag ${DOCKER_HUB_IMAGE}:latest \
            --tag ${DOCKER_HUB_IMAGE}:${TAG} \
            ${GITHUB_IMAGE}:${{ github.sha }}

      - name: Tag & Push Console Image to GHCR & Docker Hub
        run: |
          export GITHUB_IMAGE=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}
          export DOCKER_HUB_IMAGE=${{ env.DOCKER_HUB_ORGANIZATION }}/${{ env.CONSOLE_DOCKER_IMAGE }}
          export TAG=${VERSION}
          docker buildx imagetools create \
            --tag ${GITHUB_IMAGE}:latest \
            --tag ${GITHUB_IMAGE}:${TAG} \
            --tag ${DOCKER_HUB_IMAGE}:latest \
            --tag ${DOCKER_HUB_IMAGE}:${TAG} \
            ${GITHUB_IMAGE}:${{ github.sha }}

      - name: Tag & Push CLI Image to GHCR & Docker Hub
        run: |
          export GITHUB_IMAGE=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CLI_DOCKER_IMAGE }}
          export DOCKER_HUB_IMAGE=${{ env.DOCKER_HUB_ORGANIZATION }}/${{ env.CLI_DOCKER_IMAGE }}
          export TAG=${VERSION}
          docker buildx imagetools create \
            --tag ${GITHUB_IMAGE}:latest \
            --tag ${GITHUB_IMAGE}:${TAG} \
            --tag ${DOCKER_HUB_IMAGE}:latest \
            --tag ${DOCKER_HUB_IMAGE}:${TAG} \
            ${GITHUB_IMAGE}:${{ github.sha }}

      # Generate release notes and publish
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        with:
          mold-version: ${{ inputs.mold-version }}

      - name: Generate Release Notes
        run: cargo gen-notes

      - name: GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.6.2 # zizmor: ignore[superfluous-actions] handles multi-file uploads, prerelease detection, and notes body; preferred over a hand-rolled `gh release` script
        with:
          tag_name: ${{ env.VERSION }}
          prerelease: ${{ contains(env.VERSION, '-rc') }}
          body_path: release-notes.md
          files: |
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}.sha256
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}.sha256
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_MACOS_X86_64 }}
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_MACOS_X86_64 }}.sha256
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_MACOS_ARM_64 }}
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_MACOS_ARM_64 }}.sha256
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_WINDOWS_X86_64 }}.exe
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_WINDOWS_X86_64 }}.exe.sha256
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_WINDOWS_ARM_64 }}.exe
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_WINDOWS_ARM_64 }}.exe.sha256
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}.deb
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}.deb.sha256
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}.deb
            ${{ env.CLI_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}.deb.sha256
            ${{ env.RUNNER_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}
            ${{ env.RUNNER_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_X86_64 }}.sha256
            ${{ env.RUNNER_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}
            ${{ env.RUNNER_BIN_NAME }}-${{ env.VERSION }}-${{ env.BUILD_LINUX_ARM_64 }}.sha256
