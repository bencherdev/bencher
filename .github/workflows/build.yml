name: Build

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      wasm-pack-version:
        type: string
        required: true
      litestream-version:
        type: string
        required: true
      cargo-chef-version:
        type: string
        required: true
      sccache-version:
        type: string
        required: true
      is-fork:
        type: boolean
        required: true
      build-action:
        type: boolean
        required: true
      build-docker:
        type: boolean
        required: true
      deploy-only:
        type: boolean
        required: true
    secrets:
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
    outputs:
      wasm-artifact-name:
        description: "WASM artifact name"
        value: "bencher-valid-pkg"

env:
  CARGO_TERM_COLOR: always
  GITHUB_REGISTRY: ghcr.io
  API_DOCKER_IMAGE: bencher-api
  # Use head_ref for PRs (avoids `/merge` suffix), otherwise use ref_name
  CACHE_NAME: ${{ github.head_ref || github.ref_name }}
  WASM_BENCHER_VALID: bencher-valid-pkg

jobs:
  build_github_action:
    name: Build GitHub Action
    if: ${{ inputs.build-action && !inputs.deploy-only }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Dependencies
        working-directory: ./services/action
        run: npm install --include=dev
      - name: Build
        working-directory: ./services/action
        run: npm run build
      - name: Check for changes
        continue-on-error: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: git diff --exit-code

  build_wasm:
    name: Build `bencher_valid` WASM
    runs-on: ubuntu-22.04
    env:
      WASM_PACK_BUILD: "wasm-pack build --target web --no-default-features --features wasm,plus"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: wasm
          mold-version: ${{ inputs.mold-version }}
      - name: Install `wasm-pack`
        env:
          INPUTS_WASM_PACK_VERSION: ${{ inputs.wasm-pack-version }}
        run: cargo install wasm-pack --version "$INPUTS_WASM_PACK_VERSION" --locked --force
      - name: WASM pack `bencher_valid`
        working-directory: ./lib/bencher_valid
        run: |
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.WASM_BENCHER_VALID }}
          path: ./lib/bencher_valid/pkg
          if-no-files-found: error

  test_wasm:
    name: Test `bencher_valid` WASM
    if: ${{ !inputs.deploy-only }}
    runs-on: ubuntu-22.04
    needs: build_wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: wasm
          mold-version: ${{ inputs.mold-version }}
      - name: cargo test `bencher_valid` WASM
        working-directory: ./lib/bencher_valid
        run: cargo test --no-default-features --features plus,wasm

  vitest:
    name: vitest
    if: ${{ !inputs.deploy-only }}
    runs-on: ubuntu-22.04
    needs: build_wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download `bencher_valid` Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.WASM_BENCHER_VALID }}
          path: ./lib/bencher_valid/pkg
      - name: npx vitest
        working-directory: ./services/console
        run: |
          npm install --include=dev
          npx vitest run

  build_console:
    name: Build Console UI
    runs-on: ubuntu-22.04
    needs: build_wasm
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !inputs.deploy-only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download `bencher_valid` Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.WASM_BENCHER_VALID }}
          path: ./lib/bencher_valid/pkg
      - name: Build Console UI
        working-directory: ./services/console
        run: npm run netlify

  build_api_docker:
    name: Build API Docker
    runs-on: ubuntu-22.04
    # `Cloudflare` environment provides the sccache cache vars (SCCACHE_BUCKET/ENDPOINT).
    # The S3 credentials arrive as repo secrets via `secrets:` below; reusable workflows
    # receive environment variables but NOT environment secrets.
    environment: Cloudflare
    if: ${{ inputs.build-docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Trusted builds (not a fork PR) use the shared registry cache + sccache; fork builds
      # get neither (cold but correct) so untrusted code can never poison the shared cache.
      - name: Set cache config
        id: cache
        env:
          IS_FORK: ${{ inputs.is-fork }}
          IMAGE_REF: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}
        run: |
          if [ "${IS_FORK}" = "true" ]; then
            {
              echo "wrapper="
              echo "cache_from="
              echo "cache_to="
            } >> "$GITHUB_OUTPUT"
          else
            CACHE_NAME="${GITHUB_REF_NAME//\//-}"
            {
              echo "wrapper=sccache"
              echo "cache_from<<EOF"
              echo "type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-amd64"
              echo "type=registry,ref=${IMAGE_REF}:cache-devel-amd64"
              echo "EOF"
              echo "cache_to=type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-amd64,mode=max"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Build & Push API Docker Image (amd64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./services/api/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:${{ github.sha }}-amd64
          build-args: |
            MOLD_VERSION=${{ inputs.mold-version }}
            LITESTREAM_VERSION=${{ inputs.litestream-version }}
            CARGO_CHEF_VERSION=${{ inputs.cargo-chef-version }}
            SCCACHE_VERSION=${{ inputs.sccache-version }}
            SCCACHE_BUCKET=${{ vars.SCCACHE_BUCKET }}
            SCCACHE_ENDPOINT=${{ vars.SCCACHE_ENDPOINT }}
            RUSTC_WRAPPER=${{ steps.cache.outputs.wrapper }}
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          secrets: |
            s3_access_key_id=${{ secrets.R2_ACCESS_KEY_ID }}
            s3_secret_access_key=${{ secrets.R2_SECRET_ACCESS_KEY }}
          push: ${{ !inputs.is-fork }}
