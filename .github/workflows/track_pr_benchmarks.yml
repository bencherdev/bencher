name: Track PR Benchmarks

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  track_pr_benchmarks:
    name: Track PR Benchmarks with Bencher
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    permissions:
      pull-requests: write
    runs-on: ubuntu-22.04
    env:
      PR_EVENT: event.json
    steps:
      - name: Download Bench Image
        id: download_bench
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v19
        with:
          name: bench_image.tar
          run_id: ${{ github.event.workflow_run.id }}
      - name: Download PR Event
        if: steps.download_bench.outcome == 'success'
        uses: dawidd6/action-download-artifact@v19
        with:
          name: ${{ env.PR_EVENT }}
          run_id: ${{ github.event.workflow_run.id }}
      - name: Load and push image
        if: steps.download_bench.outcome == 'success'
        run: |
          docker load -i bench_image.tar
          docker tag bench:ci registry.bencher.dev/bencher:${{ github.event.workflow_run.head_sha }}
          echo '${{ secrets.BENCHER_API_TOKEN }}' | docker login registry.bencher.dev -u '${{ secrets.BENCHER_USER_EMAIL }}' --password-stdin
          docker push registry.bencher.dev/bencher:${{ github.event.workflow_run.head_sha }}
      - name: Read PR Event Data
        if: steps.download_bench.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prEvent = JSON.parse(fs.readFileSync(process.env.PR_EVENT, 'utf8'));
            core.exportVariable('PR_HEAD', prEvent.pull_request.head.ref);
            core.exportVariable('PR_HEAD_SHA', prEvent.pull_request.head.sha);
            core.exportVariable('PR_BASE', prEvent.pull_request.base.ref);
            core.exportVariable('PR_BASE_SHA', prEvent.pull_request.base.sha);
            core.exportVariable('PR_NUMBER', prEvent.number);
      - uses: bencherdev/bencher@main
        if: steps.download_bench.outcome == 'success'
      - name: Track Benchmarks with Bencher
        if: steps.download_bench.outcome == 'success'
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          bencher run \
          --project bencher \
          --token "$BENCHER_API_TOKEN" \
          --image "bencher:${{ github.event.workflow_run.head_sha }}" \
          --branch "$PR_HEAD" \
          --hash "$PR_HEAD_SHA" \
          --start-point "$PR_BASE" \
          --start-point-hash "$PR_BASE_SHA" \
          --start-point-clone-thresholds \
          --start-point-reset \
          --testbed intel-v1 \
          --spec intel-v1 \
          --adapter rust_criterion \
          --error-on-alert \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          --ci-number "$PR_NUMBER"
