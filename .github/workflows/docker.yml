name: Docker

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      litestream-version:
        type: string
        required: true

env:
  GITHUB_REGISTRY: ghcr.io
  API_DOCKER_IMAGE: bencher-api
  CONSOLE_DOCKER_IMAGE: bencher-console
  CLI_DOCKER_IMAGE: bencher

jobs:
  build_api_docker:
    name: Build API Docker
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set cache name
        id: cache-name
        run: echo "value=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT
      - name: Build & Push API Docker Image (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:${{ github.sha }}
          build-args: |
            MOLD_VERSION=${{ inputs.mold-version }}
            LITESTREAM_VERSION=${{ inputs.litestream-version }}
          cache-from: |
            type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:cache-${{ steps.cache-name.outputs.value }}
            type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:cache-devel
          cache-to: type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:cache-${{ steps.cache-name.outputs.value }},mode=max
          push: true

  build_console_docker:
    name: Build Console Docker
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set cache name
        id: cache-name
        run: echo "value=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT
      - name: Build & Push Console Docker Image (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/console/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:cache-${{ steps.cache-name.outputs.value }}
            type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:cache-devel
          cache-to: type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:cache-${{ steps.cache-name.outputs.value }},mode=max
          push: true

  build_cli_docker:
    name: Build CLI Docker
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set cache name
        id: cache-name
        run: echo "value=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT
      - name: Build & Push CLI Docker Image (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
