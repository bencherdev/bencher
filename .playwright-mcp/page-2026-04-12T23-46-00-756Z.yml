    - generic [ref=e113]:
      - paragraph [ref=e114]: THE PROBLEM
      - heading "CI benchmarks are too noisy to trust" [level=2] [ref=e115]
      - paragraph [ref=e116]: If you can't tell a real regression from noise, the data is worthless. So teams stop looking, and performance regressions silently ship.
      - generic [ref=e117]:
        - generic [ref=e119]:
          - heading "CI runners are shared and unpredictable" [level=3] [ref=e120]
          - paragraph [ref=e121]: Shared CPU, memory contention, and scheduler jitter mean two identical benchmark runs can return wildly different results.
        - generic [ref=e123]:
          - heading "Noisy results train you to ignore alerts" [level=3] [ref=e124]
          - paragraph [ref=e125]: When benchmarks cry wolf on every PR, engineers stop looking. By the time a real performance regression lands, nobody catches it.
        - generic [ref=e127]:
          - heading "Performance regressions silently ship" [level=3] [ref=e128]
          - paragraph [ref=e129]: Without trustworthy benchmark results in the PR workflow, performance regressions reach production. You find out when users do.
    - generic [ref=e131]:
      - generic [ref=e132]:
        - paragraph [ref=e133]: WHY BARE METAL
        - heading "All signal. No noise." [level=2] [ref=e134]
        - paragraph [ref=e135]: CI runners introduce enough noise to mask real performance regressions. Bencher Bare Metal isolates your benchmarks on dedicated bare metal hardware, so when a number changes, it means something.
      - generic [ref=e136]:
        - generic [ref=e137]:
