name: Nix

on:
  workflow_call:
    inputs:
      nix-lint:
        type: boolean
        required: true
      nix-build:
        type: boolean
        required: true

jobs:
  nix_lints:
    name: Check Nix code
    if: ${{ inputs.nix-lint }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - name: Check nix formatting
        run: nix develop .#ci --command alejandra --check .
      - name: Check nix lints
        run: nix develop .#ci --command statix check
      - name: Check for dead nix code
        run: nix develop .#ci --command deadnix

  build_bencher_nix:
    name: Build `bencher` Nix Package
    if: ${{ inputs.nix-build }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - name: Nix build
        run: nix build .#bencher
