[package]
name = "api_mcp"
version.workspace = true
authors.workspace = true
edition.workspace = true
license-file.workspace = true
publish = false

[features]
default = []
plus = [
    "dep:api_projects",
    "api_projects/plus",
    "dep:api_run",
    "api_run/plus",
    "dep:base64",
    "dep:bencher_endpoint",
    "bencher_endpoint/plus",
    "dep:bencher_json",
    "bencher_json/plus",
    "dep:bencher_schema",
    "bencher_schema/plus",
    "dep:dropshot",
    "dep:http",
    "dep:rmcp",
    "dep:schemars",
    "dep:serde",
    "dep:serde_json",
    "dep:slog",
    "dep:strum",
]

[dependencies]
api_projects = { workspace = true, optional = true }
api_run = { workspace = true, optional = true }
bencher_endpoint = { workspace = true, optional = true }
bencher_json = { workspace = true, features = ["server", "schema"], optional = true }
bencher_schema = { workspace = true, optional = true }

base64 = { workspace = true, optional = true }
dropshot = { workspace = true, optional = true }
http = { workspace = true, optional = true }
rmcp = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
slog = { workspace = true, optional = true }
strum = { workspace = true, optional = true }

[dev-dependencies]
bencher_api_tests.workspace = true
bencher_json = { workspace = true, features = ["server"] }
diesel.workspace = true
http.workspace = true
reqwest = { workspace = true, features = ["json", "rustls-no-provider"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true
