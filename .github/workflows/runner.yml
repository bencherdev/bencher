name: Runner

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      zig-version:
        type: string
        required: true
      zig-build-version:
        type: string
        required: true

env:
  CARGO_TERM_COLOR: always
  RUNNER_BIN_NAME: runner

jobs:
  test_runner_scenarios:
    name: Test Runner Scenarios
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          mold-version: ${{ inputs.mold-version }}
          cache-key: test-runner-scenarios
      - name: Install musl toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Verify KVM
        run: |
          ls -la /dev/kvm
      - name: Enable containerd image store
        run: |
          echo '{"features": {"containerd-snapshotter": true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Run scenarios
        run: cargo test-runner scenarios

  build_runner:
    name: Build Runner (${{ matrix.build }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x86-64
            target: x86_64-unknown-linux-gnu
            init-target: x86_64-unknown-linux-musl
          - build: linux-arm-64
            target: aarch64-unknown-linux-gnu
            init-target: aarch64-unknown-linux-musl
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set Runner version
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          VERSION="$HEAD_REF"
          echo "RUNNER_VERSION=${VERSION//\//-}" >> "$GITHUB_ENV"
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          mold-version: ${{ inputs.mold-version }}
          cache-key: build-runner-${{ matrix.build }}
      - name: Install Rust targets
        run: rustup target add ${{ matrix.target }} ${{ matrix.init-target }}
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ inputs.zig-version }}
      - name: Install cargo-zigbuild
        env:
          INPUTS_ZIG_BUILD_VERSION: ${{ inputs.zig-build-version }}
        run: cargo install --version "$INPUTS_ZIG_BUILD_VERSION" --locked --force cargo-zigbuild
      - name: Build bencher-init (static musl)
        run: cargo zigbuild --release --target ${{ matrix.init-target }} -p bencher_init
      - name: Build bencher-runner (release)
        run: cargo zigbuild --release --target ${{ matrix.target }} -p bencher_runner_cli --features plus
      - name: Rename Runner binary
        run: mv ./target/${{ matrix.target }}/release/${{ env.RUNNER_BIN_NAME }} ${{ env.RUNNER_BIN_NAME }}-${RUNNER_VERSION}-${{ matrix.build }}
      - name: Generate SHA256 checksum
        run: sha256sum ${{ env.RUNNER_BIN_NAME }}-${RUNNER_VERSION}-${{ matrix.build }} > ${{ env.RUNNER_BIN_NAME }}-${RUNNER_VERSION}-${{ matrix.build }}.sha256
      - name: Upload Runner Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.RUNNER_BIN_NAME }}-${{ env.RUNNER_VERSION }}-${{ matrix.build }}
          path: |
            ${{ env.RUNNER_BIN_NAME }}-${{ env.RUNNER_VERSION }}-${{ matrix.build }}
            ${{ env.RUNNER_BIN_NAME }}-${{ env.RUNNER_VERSION }}-${{ matrix.build }}.sha256
          if-no-files-found: error
