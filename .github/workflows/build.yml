name: Build

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      wasm-pack-version:
        type: string
        required: true
      litestream-version:
        type: string
        required: true
      build-action:
        type: boolean
        required: true
      build-docker:
        type: boolean
        required: true
      deploy-only:
        type: boolean
        required: true
    outputs:
      wasm-artifact-name:
        description: "WASM artifact name"
        value: "bencher-valid-pkg"

env:
  CARGO_TERM_COLOR: always
  GITHUB_REGISTRY: ghcr.io
  API_DOCKER_IMAGE: bencher-api
  # Use head_ref for PRs (avoids `/merge` suffix), otherwise use ref_name
  CACHE_NAME: ${{ github.head_ref || github.ref_name }}
  WASM_BENCHER_VALID: bencher-valid-pkg

jobs:
  build_github_action:
    name: Build GitHub Action
    if: ${{ inputs.build-action && !inputs.deploy-only }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Dependencies
        working-directory: ./services/action
        run: npm install --include=dev
      - name: Build
        working-directory: ./services/action
        run: npm run build
      - name: Check for changes
        continue-on-error: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: git diff --exit-code

  build_wasm:
    name: Build `bencher_valid` WASM
    runs-on: ubuntu-22.04
    env:
      WASM_PACK_BUILD: "wasm-pack build --target web --no-default-features --features wasm,plus"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: wasm
          mold-version: ${{ inputs.mold-version }}
      - name: Install `wasm-pack`
        run: cargo install wasm-pack --version ${{ inputs.wasm-pack-version }} --locked --force
      - name: WASM pack `bencher_valid`
        working-directory: ./lib/bencher_valid
        run: |
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD || \
          $WASM_PACK_BUILD
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.WASM_BENCHER_VALID }}
          path: ./lib/bencher_valid/pkg
          if-no-files-found: error

  test_wasm:
    name: Test `bencher_valid` WASM
    if: ${{ !inputs.deploy-only }}
    runs-on: ubuntu-22.04
    needs: build_wasm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: wasm
          mold-version: ${{ inputs.mold-version }}
      - name: cargo test `bencher_valid` WASM
        working-directory: ./lib/bencher_valid
        run: cargo test --no-default-features --features plus,wasm

  vitest:
    name: vitest
    if: ${{ !inputs.deploy-only }}
    runs-on: ubuntu-22.04
    needs: build_wasm
    steps:
      - uses: actions/checkout@v6
      - name: Download `bencher_valid` Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WASM_BENCHER_VALID }}
          path: ./lib/bencher_valid/pkg
      - name: npx vitest
        working-directory: ./services/console
        run: |
          npm install --include=dev
          npx vitest run

  build_console:
    name: Build Console UI
    runs-on: ubuntu-22.04
    needs: build_wasm
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !inputs.deploy-only }}
    steps:
      - uses: actions/checkout@v6
      - name: Download `bencher_valid` Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WASM_BENCHER_VALID }}
          path: ./lib/bencher_valid/pkg
      - name: Build Console UI
        working-directory: ./services/console
        run: npm run netlify

  build_api_docker:
    name: Build API Docker
    runs-on: ubuntu-22.04
    if: ${{ inputs.build-docker }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set cache name
        id: cache-name
        run: echo "value=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT
      - name: Build & Push API Docker Image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./services/api/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:${{ github.sha }}-amd64
          build-args: |
            MOLD_VERSION=${{ inputs.mold-version }}
            LITESTREAM_VERSION=${{ inputs.litestream-version }}
          cache-from: |
            type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:cache-${{ steps.cache-name.outputs.value }}-amd64
            type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:cache-devel-amd64
          cache-to: type=registry,ref=${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:cache-${{ steps.cache-name.outputs.value }}-amd64,mode=max
          push: true
