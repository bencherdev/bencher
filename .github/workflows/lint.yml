name: Lint

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      typeshare-version:
        type: string
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo_fmt:
    name: Cargo Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Add fmt
        run: rustup component add rustfmt
      - name: Run fmt
        run: cargo fmt -- --check

  cargo_clippy:
    name: Cargo Clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: all-features
          mold-version: ${{ inputs.mold-version }}
      - name: Add clippy
        run: rustup component add clippy
      - name: Run clippy
        run: ./scripts/clippy.sh

  check_generated:
    name: Check Generated
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Generate OpenAPI Spec
        run: cargo gen-spec
      - name: Check OpenAPI Spec for changes
        run: git diff --exit-code
      - name: Install Typeshare CLI
        run: cargo install typeshare-cli --version ${{ inputs.typeshare-version }} --locked
      - name: Generate Typescript Types
        run: cargo gen-ts
      - name: Check Typescript Types for changes
        run: git diff --exit-code
      - name: Generate Unix CLI install scripts
        run: cargo gen-installer cli sh
      - name: Check Unix CLI install script for changes
        run: git diff --exit-code
      - name: Generate Windows CLI install scripts
        run: cargo gen-installer cli ps1
      - name: Check Windows CLI install script for changes
        run: git diff --exit-code
      - name: Generate Runner install script
        run: cargo gen-installer runner
      - name: Check Runner install script for changes
        run: git diff --exit-code

  cargo_deny:
    name: Cargo Deny
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18
        with:
          log-level: warn
          command: check
          arguments: --locked

  biome_format:
    name: Biome Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Biome format Action
        working-directory: ./services/action
        run: |
          npm install --include=dev
          npx biome ci --linter-enabled false --organize-imports-enabled false .
      - name: Biome format Console UI
        working-directory: ./services/console
        run: |
          npm install --include=dev
          npx biome ci --linter-enabled false --organize-imports-enabled false .

  biome_lint:
    name: Biome Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Biome check Action
        working-directory: ./services/action
        run: |
          npm install --include=dev
          npx biome ci --formatter-enabled false --organize-imports-enabled false .
      - name: Biome check Console UI
        working-directory: ./services/console
        run: |
          npm install --include=dev
          npx biome ci --formatter-enabled false --organize-imports-enabled false .
