name: Test

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      go-version:
        type: string
        required: true
      is-fork:
        type: boolean
        required: true
    secrets:
      TEST_BILLING_KEY:
        required: true
      BENCHER_API_TOKEN:
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo_test:
    name: Cargo Test
    if: ${{ !inputs.is-fork }}
    runs-on: ubuntu-22.04
    env:
      TEST_BILLING_KEY: ${{ secrets.TEST_BILLING_KEY }}
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: all-features
          mold-version: ${{ inputs.mold-version }}
      - name: Run Tests
        run: ./scripts/test.sh
      - name: Upload Perf JPEG
        uses: actions/upload-artifact@v4
        with:
          name: perf.jpeg
          path: ./lib/bencher_plot/perf.jpeg
          if-no-files-found: error

  cargo_test_fork:
    name: Cargo Test
    if: ${{ inputs.is-fork }}
    runs-on: ubuntu-22.04
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
      - uses: actions/checkout@v6
      - uses: rui314/setup-mold@v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run
        run: RUST_BACKTRACE=1 cargo nextest run --all-features --no-capture --profile ci
      - name: cargo test --doc
        run: RUST_BACKTRACE=1 cargo test --doc --all-features
      - name: Upload Perf JPEG
        uses: actions/upload-artifact@v4
        with:
          name: perf.jpeg
          path: ./lib/bencher_plot/perf.jpeg
          if-no-files-found: error

  api_smoke_test:
    name: API Smoke Test
    runs-on: ubuntu-22.04
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        if: ${{ !inputs.is-fork }}
        with:
          cache-key: api
          mold-version: ${{ inputs.mold-version }}
      - uses: rui314/setup-mold@v1
        if: ${{ inputs.is-fork }}
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Setup Go (for OCI conformance tests)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Install musl toolchain (for runner daemon)
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Enable KVM (for runner daemon)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Configure Docker for insecure local registry
        # Port must match bencher_json::BENCHER_API_PORT
        run: |
          echo '{"insecure-registries": ["localhost:61016"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Run Smoke Test
        env:
          RUST_BACKTRACE: full
        run: cargo test-api smoke ci

  cargo_bench:
    name: Cargo Bench
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: rui314/setup-mold@v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Run Benchmarks
        run: cargo bench --package bencher_adapter --package bencher_schema | tee benchmark_results.txt
      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_results.txt
          path: ./benchmark_results.txt
      - name: Upload GitHub Pull Request Event
        uses: actions/upload-artifact@v4
        with:
          name: event.json
          path: ${{ github.event_path }}

  bencher_noise:
    name: Bencher Noise
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        if: matrix.os == 'ubuntu-22.04'
        with:
          cache-key: noise
          mold-version: ${{ inputs.mold-version }}
      - name: Run bencher noise (Unix)
        if: matrix.os != 'windows-2022'
        run: cargo run -p bencher_cli -- noise --format json --quiet > noise_results_${{ matrix.os }}.json
      - name: Run bencher noise (Windows)
        if: matrix.os == 'windows-2022'
        run: cargo run -p bencher_cli -- noise --format json --quiet | Out-File -FilePath noise_results_${{ matrix.os }}.json -Encoding utf8
      - name: Upload Noise Results
        uses: actions/upload-artifact@v4
        with:
          name: noise_results_${{ matrix.os }}
          path: ./noise_results_${{ matrix.os }}.json
          if-no-files-found: error

  track_benchmarks:
    name: Track Benchmarks
    if: ${{ github.ref == 'refs/heads/devel' || github.ref == 'refs/heads/cloud' || github.ref == 'refs/heads/main' }}
    needs: [cargo_bench, bencher_noise]
    uses: ./.github/workflows/track_benchmarks.yml
    secrets:
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}

  cargo_udeps:
    name: Cargo Unused Deps
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        if: ${{ !inputs.is-fork }}
        with:
          cache-key: nightly
          mold-version: ${{ inputs.mold-version }}
      - uses: rui314/setup-mold@v1
        if: ${{ inputs.is-fork }}
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - name: Install udeps
        run: cargo install --version 0.1.50 --locked --force cargo-udeps
      - name: Run API udeps
        continue-on-error: true
        working-directory: ./services/api
        run: cargo +nightly udeps --all-targets
      - name: Run CLI udeps
        continue-on-error: true
        working-directory: ./services/cli
        run: cargo +nightly udeps --all-targets

  foss_cargo_check:
    name: Cargo Check Workspace (not(plus))
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: rui314/setup-mold@v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: cargo check
        run: cargo check --no-default-features

  foss_console:
    name: Bencher Console (not(plus))
    runs-on: ubuntu-22.04
    env:
      WASM_PACK_VERSION: "0.12.1"
    steps:
      - uses: actions/checkout@v6
      - name: Install `wasm-pack`
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked --force
      - name: Build WASM
        working-directory: ./services/console
        run: npm run wasm:not-plus
      - name: Build Console
        working-directory: ./services/console
        run: npm run node

  docker_smoke_test:
    name: Docker API Smoke Test
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
      - uses: actions/checkout@v6
      - uses: rui314/setup-mold@v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Run Smoke Test
        env:
          RUST_BACKTRACE: full
        run: cargo test-api smoke docker
