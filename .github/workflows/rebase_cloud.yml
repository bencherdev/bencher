name: Rebase cloud on devel

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  rebase_cloud_on_devel:
    name: Rebase cloud on devel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2 # zizmor: ignore[artipacked] this job rebases cloud onto devel and pushes, so it needs the persisted GITHUB_TOKEN
        with:
          fetch-depth: 0
      - name: Rebase cloud on devel
        run: |
          set -euo pipefail
          git config --global user.name "Bencher"
          git config --global user.email "git@bencher.dev"
          git fetch origin devel cloud
          git checkout cloud
          git rebase origin/devel
          git push
      - name: Trigger CI
        run: gh workflow run ci.yml --ref cloud
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
