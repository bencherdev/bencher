[package]
name = "bencher_runner_cli"
version.workspace = true
authors.workspace = true
edition.workspace = true
license-file.workspace = true
publish = false

[features]
default = ["plus"]
plus = [
    "bencher_runner/plus",
    "dep:bencher_json",
    "dep:bencher_parser",
    "dep:bencher_runner",
    "dep:camino",
    "dep:rustls",
    "dep:url",
]

[dependencies]
bencher_json = { workspace = true, optional = true }
bencher_parser = { workspace = true, optional = true }
bencher_runner = { workspace = true, optional = true }
camino = { workspace = true, optional = true }
clap = { workspace = true, features = ["env"] }
rustls = { workspace = true, optional = true }
thiserror.workspace = true
url = { workspace = true, optional = true }

[lints]
workspace = true

[[bin]]
name = "runner"
path = "src/main.rs"
