name: Docker

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      litestream-version:
        type: string
        required: true
      cargo-chef-version:
        type: string
        required: true
      sccache-version:
        type: string
        required: true
      is-fork:
        type: boolean
        required: true
    secrets:
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false

env:
  GITHUB_REGISTRY: ghcr.io
  API_DOCKER_IMAGE: bencher-api
  CONSOLE_DOCKER_IMAGE: bencher-console
  CLI_DOCKER_IMAGE: bencher

jobs:
  build_api_docker:
    name: Build API Docker (${{ matrix.suffix }})
    # `Cloudflare` environment provides the sccache cache vars (SCCACHE_BUCKET/ENDPOINT).
    # The S3 credentials arrive as repo secrets via `secrets:` below; reusable workflows
    # receive environment variables but NOT environment secrets.
    environment: Cloudflare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Trusted builds (not a fork PR) use the shared registry cache + sccache; fork builds
      # get neither (cold but correct) so untrusted code can never poison the shared cache.
      - name: Set cache config
        id: cache
        env:
          IS_FORK: ${{ inputs.is-fork }}
          IMAGE_REF: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          if [ "${IS_FORK}" = "true" ]; then
            {
              echo "wrapper="
              echo "cache_from="
              echo "cache_to="
            } >> "$GITHUB_OUTPUT"
          else
            CACHE_NAME="${GITHUB_REF_NAME//\//-}"
            {
              echo "wrapper=sccache"
              echo "cache_from<<EOF"
              echo "type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-${SUFFIX}"
              echo "type=registry,ref=${IMAGE_REF}:cache-devel-${SUFFIX}"
              echo "EOF"
              echo "cache_to=type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-${SUFFIX},mode=max"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Build & Push API Docker Image (${{ matrix.suffix }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./services/api/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:${{ github.sha }}-${{ matrix.suffix }}
          build-args: |
            MOLD_VERSION=${{ inputs.mold-version }}
            LITESTREAM_VERSION=${{ inputs.litestream-version }}
            CARGO_CHEF_VERSION=${{ inputs.cargo-chef-version }}
            SCCACHE_VERSION=${{ inputs.sccache-version }}
            SCCACHE_BUCKET=${{ vars.SCCACHE_BUCKET }}
            SCCACHE_ENDPOINT=${{ vars.SCCACHE_ENDPOINT }}
            RUSTC_WRAPPER=${{ steps.cache.outputs.wrapper }}
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          secrets: |
            s3_access_key_id=${{ secrets.R2_ACCESS_KEY_ID }}
            s3_secret_access_key=${{ secrets.R2_SECRET_ACCESS_KEY }}
          push: ${{ !inputs.is-fork }}

  create_api_docker_manifest:
    name: Create API Docker Manifest
    needs: build_api_docker
    # Fork builds do not push per-arch images, so there is nothing to assemble.
    if: ${{ !inputs.is-fork }}
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:${{ github.sha }} \
            ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_DOCKER_IMAGE }}:${{ github.sha }}-arm64

  build_console_docker:
    name: Build Console Docker (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Trusted builds (not a fork PR) use the shared registry cache; fork builds get neither
      # (a read-only token cannot export cache or push), so they build cold and push nothing.
      - name: Set cache config
        id: cache
        env:
          IS_FORK: ${{ inputs.is-fork }}
          IMAGE_REF: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          if [ "${IS_FORK}" = "true" ]; then
            {
              echo "cache_from="
              echo "cache_to="
            } >> "$GITHUB_OUTPUT"
          else
            CACHE_NAME="${GITHUB_REF_NAME//\//-}"
            {
              echo "cache_from<<EOF"
              echo "type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-${SUFFIX}"
              echo "type=registry,ref=${IMAGE_REF}:cache-devel-${SUFFIX}"
              echo "EOF"
              echo "cache_to=type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-${SUFFIX},mode=max"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Build & Push Console Docker Image (${{ matrix.suffix }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./services/console/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:${{ github.sha }}-${{ matrix.suffix }}
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          push: ${{ !inputs.is-fork }}

  create_console_docker_manifest:
    name: Create Console Docker Manifest
    needs: build_console_docker
    # Fork builds do not push per-arch images, so there is nothing to assemble.
    if: ${{ !inputs.is-fork }}
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:${{ github.sha }} \
            ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CONSOLE_DOCKER_IMAGE }}:${{ github.sha }}-arm64

  build_cli_docker:
    name: Build CLI Docker (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Trusted builds (not a fork PR) use the shared registry cache; fork builds get neither
      # (a read-only token cannot export cache or push), so they build cold and push nothing.
      - name: Set cache config
        id: cache
        env:
          IS_FORK: ${{ inputs.is-fork }}
          IMAGE_REF: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CLI_DOCKER_IMAGE }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          if [ "${IS_FORK}" = "true" ]; then
            {
              echo "cache_from="
              echo "cache_to="
            } >> "$GITHUB_OUTPUT"
          else
            CACHE_NAME="${GITHUB_REF_NAME//\//-}"
            {
              echo "cache_from<<EOF"
              echo "type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-${SUFFIX}"
              echo "type=registry,ref=${IMAGE_REF}:cache-devel-${SUFFIX}"
              echo "EOF"
              echo "cache_to=type=registry,ref=${IMAGE_REF}:cache-${CACHE_NAME}-${SUFFIX},mode=max"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Build & Push CLI Docker Image (${{ matrix.suffix }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./services/cli/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CLI_DOCKER_IMAGE }}:${{ github.sha }}-${{ matrix.suffix }}
          build-args: |
            MOLD_VERSION=${{ inputs.mold-version }}
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          push: ${{ !inputs.is-fork }}

  create_cli_docker_manifest:
    name: Create CLI Docker Manifest
    needs: build_cli_docker
    # Fork builds do not push per-arch images, so there is nothing to assemble.
    if: ${{ !inputs.is-fork }}
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CLI_DOCKER_IMAGE }}:${{ github.sha }} \
            ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CLI_DOCKER_IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.GITHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.CLI_DOCKER_IMAGE }}:${{ github.sha }}-arm64
