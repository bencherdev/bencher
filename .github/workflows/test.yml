name: Test

on:
  workflow_call:
    inputs:
      mold-version:
        type: string
        required: true
      go-version:
        type: string
        required: true
      is-fork:
        type: boolean
        required: true
    secrets:
      TEST_BILLING_KEY:
        required: true
      BENCHER_API_KEY:
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo_test:
    name: Cargo Test
    if: ${{ !inputs.is-fork }}
    runs-on: ubuntu-22.04
    env:
      TEST_BILLING_KEY: ${{ secrets.TEST_BILLING_KEY }}
    steps:
      - uses: BRAINSia/free-disk-space@7048ffbf50819342ac964ef3998a51c2564a8a75 # v2.1.3
        with:
          large-packages: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: all-features
          mold-version: ${{ inputs.mold-version }}
      - name: Run Tests
        run: ./scripts/test.sh
      - name: Upload Perf JPEG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf.jpeg
          path: ./lib/bencher_plot/perf.jpeg
          if-no-files-found: error

  cargo_test_fork:
    name: Cargo Test
    if: ${{ inputs.is-fork }}
    runs-on: ubuntu-22.04
    steps:
      - uses: BRAINSia/free-disk-space@7048ffbf50819342ac964ef3998a51c2564a8a75 # v2.1.3
        with:
          large-packages: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-nextest
      - name: cargo nextest run
        run: RUST_BACKTRACE=1 cargo nextest run --all-features --no-capture --profile ci
      - name: cargo test --doc
        run: RUST_BACKTRACE=1 cargo test --doc --all-features
      - name: Upload Perf JPEG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf.jpeg
          path: ./lib/bencher_plot/perf.jpeg
          if-no-files-found: error

  api_smoke_test:
    name: API Smoke Test (${{ matrix.image-store }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        image-store: [overlay2, containerd]
    steps:
      - uses: BRAINSia/free-disk-space@7048ffbf50819342ac964ef3998a51c2564a8a75 # v2.1.3
        with:
          large-packages: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        if: ${{ !inputs.is-fork }}
        with:
          cache-key: api
          mold-version: ${{ inputs.mold-version }}
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        if: ${{ inputs.is-fork }}
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Setup Go (for OCI conformance tests)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ inputs.go-version }}
      - name: Install musl toolchain (for runner daemon)
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Enable KVM (for runner daemon)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Configure Docker for insecure local registry (overlay2)
        # Port must match bencher_json::BENCHER_API_PORT
        if: matrix.image-store == 'overlay2'
        run: |
          echo '{"insecure-registries": ["localhost:6610"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Configure Docker for insecure local registry (containerd)
        if: matrix.image-store == 'containerd'
        run: |
          echo '{"insecure-registries": ["localhost:6610"], "features": {"containerd-snapshotter": true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Run Smoke Test
        env:
          RUST_BACKTRACE: full
        run: cargo test-api smoke ci

  bench_image:
    name: Bench Image
    runs-on: ubuntu-22.04
    steps:
      - uses: BRAINSia/free-disk-space@7048ffbf50819342ac964ef3998a51c2564a8a75 # v2.1.3
        with:
          large-packages: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build Docker image
        env:
          INPUTS_MOLD_VERSION: ${{ inputs.mold-version }}
        run: |
          docker build \
            --build-arg "MOLD_VERSION=$INPUTS_MOLD_VERSION" \
            -t bench:ci \
            -f docker/bench.Dockerfile \
            .
      - name: Save image as tarball
        run: docker save bench:ci -o bench_image.tar
      - name: Upload image tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench_image.tar
          path: ./bench_image.tar
      - name: Upload GitHub Pull Request Event
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: event.json
          path: ${{ github.event_path }}

  bencher_noise:
    name: Bencher Noise
    if: ${{ github.ref == 'refs/heads/devel' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        if: matrix.os == 'ubuntu-22.04'
        with:
          cache-key: noise
          mold-version: ${{ inputs.mold-version }}
      - name: Run bencher noise (Unix)
        if: matrix.os != 'windows-2022'
        run: cargo run -p bencher_cli -- noise --format json --quiet > noise_results_${{ matrix.os }}.json
      - name: Run bencher noise (Windows)
        if: matrix.os == 'windows-2022'
        run: cargo run -p bencher_cli -- noise --format json --quiet | Out-File -FilePath noise_results_${{ matrix.os }}.json -Encoding utf8
      - name: Upload Noise Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: noise_results_${{ matrix.os }}
          path: ./noise_results_${{ matrix.os }}.json
          if-no-files-found: error

  track_benchmarks:
    name: Track Benchmarks
    permissions:
      contents: read
      checks: write
    if: ${{ github.ref == 'refs/heads/devel' }}
    needs: [bench_image, bencher_noise]
    uses: ./.github/workflows/track_benchmarks.yml
    secrets:
      BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}

  cargo_udeps:
    name: Cargo Unused Deps
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        if: ${{ !inputs.is-fork }}
        with:
          cache-key: nightly
          mold-version: ${{ inputs.mold-version }}
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        if: ${{ inputs.is-fork }}
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - name: Install udeps
        run: cargo install --version 0.1.50 --locked --force cargo-udeps
      - name: Run API udeps
        continue-on-error: true
        working-directory: ./services/api
        run: cargo +nightly udeps --all-targets
      - name: Run CLI udeps
        continue-on-error: true
        working-directory: ./services/cli
        run: cargo +nightly udeps --all-targets

  foss_cargo_check:
    name: Cargo Check Workspace (not(plus))
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: cargo check
        run: cargo check --no-default-features

  foss_console:
    name: Bencher Console (not(plus))
    runs-on: ubuntu-22.04
    env:
      WASM_PACK_VERSION: "0.12.1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install `wasm-pack`
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked --force
      - name: Build WASM
        working-directory: ./services/console
        run: npm run wasm:not-plus
      - name: Build Console
        working-directory: ./services/console
        run: npm run node

  docker_smoke_test:
    name: Docker API Smoke Test
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: BRAINSia/free-disk-space@7048ffbf50819342ac964ef3998a51c2564a8a75 # v2.1.3
        with:
          large-packages: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        with:
          mold-version: ${{ inputs.mold-version }}
      - name: Run Smoke Test
        env:
          RUST_BACKTRACE: full
        run: cargo test-api smoke docker

  replica_live_s3:
    name: Replica Live S3 (${{ matrix.server.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        server:
          # Two S3-compatible implementations: MinIO exercises the full API
          # (including ListMultipartUploads for the orphan sweep); RustFS
          # pins compatibility with a second, Rust-native implementation.
          - name: minio
            start: >-
              docker run -d --name live-s3 -p 9000:9000
              -e MINIO_ROOT_USER=bencher-test
              -e MINIO_ROOT_PASSWORD=bencher-test-secret
              minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          - name: rustfs
            start: >-
              docker run -d --name live-s3 -p 9000:9000
              -e RUSTFS_ACCESS_KEY=bencher-test
              -e RUSTFS_SECRET_KEY=bencher-test-secret
              rustfs/rustfs:1.0.0-beta.10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: replica-live-s3
          mold-version: ${{ inputs.mold-version }}
      - name: Start S3 server
        env:
          START_SERVER: ${{ matrix.server.start }}
        run: |
          ${START_SERVER}
          for _ in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:9000/; then
              exit 0
            fi
            sleep 2
          done
          echo "S3 server did not come up" >&2
          docker logs live-s3 >&2 || true
          exit 1
      - name: Create bucket
        env:
          AWS_ACCESS_KEY_ID: bencher-test
          AWS_SECRET_ACCESS_KEY: bencher-test-secret
          AWS_DEFAULT_REGION: us-east-1
        run: |
          for _ in $(seq 1 15); do
            if aws --endpoint-url http://127.0.0.1:9000 s3api create-bucket \
              --bucket bencher-replica-test; then
              exit 0
            fi
            sleep 2
          done
          echo "failed to create the test bucket" >&2
          docker logs live-s3 >&2 || true
          exit 1
      - name: Run live S3 tier
        env:
          RUST_BACKTRACE: "1"
          BENCHER_REPLICA_TEST_S3_BUCKET: bencher-replica-test
          BENCHER_REPLICA_TEST_S3_ACCESS_KEY_ID: bencher-test
          BENCHER_REPLICA_TEST_S3_SECRET_ACCESS_KEY: bencher-test-secret
          BENCHER_REPLICA_TEST_S3_ENDPOINT: http://127.0.0.1:9000
          BENCHER_REPLICA_TEST_S3_REGION: us-east-1
          BENCHER_REPLICA_TEST_S3_PREFIX: ci-live-s3
        run: |
          cargo nextest run -p bencher_replica --features plus,testing \
            --run-ignored ignored-only --no-fail-fast -E 'binary(live_s3)'
